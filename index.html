<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina - Image Gallery</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-gem" aria-hidden="true"></span>
        <h1 class="brand-name">Lumina</h1>
      </div>
      <p class="brand-tagline">A curated collection of visual stories</p>
    </div>
    <div class="header-rule"></div>
  </header>


  <nav class="filter-nav" aria-label="Filter gallery by category">
    <button class="filter-btn active" data-filter="all">
      All <span class="badge" data-count="all"></span>
    </button>
    <button class="filter-btn" data-filter="nature">
      Nature <span class="badge" data-count="nature"></span>
    </button>
    <button class="filter-btn" data-filter="architecture">
      Architecture <span class="badge" data-count="architecture"></span>
    </button>
    <button class="filter-btn" data-filter="abstract">
      Abstract <span class="badge" data-count="abstract"></span>
    </button>
    <button class="filter-btn" data-filter="travel">
      Travel <span class="badge" data-count="travel"></span>
    </button>
  </nav>

  
  <main class="gallery-wrapper">
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Empty state -->
    <div class="gallery-empty" id="galleryEmpty" hidden>
      <span class="empty-gem" aria-hidden="true"></span>
      <p>No images in this category</p>
    </div>
  </main>

  
  <div
    class="lightbox"
    id="lightbox"
    hidden
    role="dialog"
    aria-modal="true"
    aria-label="Full-size image viewer"
  >
    <!-- Clickable backdrop -->
    <div class="lb-backdrop" id="lbBackdrop"></div>

    <!-- Frame -->
    <div class="lb-frame">
      <!-- Image area -->
      <div class="lb-img-wrap" id="lbImgWrap">
        <div class="lb-loader" id="lbLoader" aria-hidden="true"></div>
        <img class="lb-image" id="lbImage" src="" alt="" />
      </div>

      <!-- Caption row -->
      <div class="lb-caption-row">
        <div class="lb-text">
          <h2 class="lb-title"    id="lbTitle"></h2>
          <p  class="lb-subtitle" id="lbSubtitle"></p>
        </div>
        <span class="lb-cat-badge" id="lbBadge"></span>
      </div>

      <!-- Counter -->
      <p class="lb-counter" id="lbCounter"></p>
    </div>

    <!-- Controls -->
    <button class="lb-ctrl lb-close" id="lbClose" aria-label="Close">
      <!-- × icon -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M2 2L16 16M16 2L2 16" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round"/>
      </svg>
    </button>

    <button class="lb-ctrl lb-prev" id="lbPrev" aria-label="Previous image">
      <!-- ← icon -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M12 3L5 9L12 15" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="lb-ctrl lb-next" id="lbNext" aria-label="Next image">
      <!-- → icon -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M6 3L13 9L6 15" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script src="index.js"></script>
</body>
</html>
